name: GitHub Profile Summary Cards

on:
  push:
  schedule:
    - cron: "0 0 *  * *"
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3

      - uses: vn7n24fzkq/github-profile-summary-cards@release
        with:
          USERNAME: LaraScaranello
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
